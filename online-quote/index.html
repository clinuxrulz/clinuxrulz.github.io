<!DOCTYPE html>
<html lang="en">
    <head>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/webcomponentsjs/1.0.11/custom-elements-es5-adapter.js"></script>
        <script src="js/webcomponents-lite.js"></script>
        <style>
            html, body { height: 100%; width: 100%; margin: 0; }

            .flex-container {
                display: flex;
            }

            .flex-vertical {
                flex-direction: column;
            }
        </style>
    </head>
    <body>
        <script  type="text/javascript" src="online-quote.js"></script>

        <script>
            var openPropertiesAppCallback = function(propertiesName) {};
            var addOpeningButtonClickCallback = function(openingType) {};
            var toggleBaysButtonClickCallback = function() {};
            var toggleWallsButtonClickCallback = function() {};
            function openProperties(propertiesName) {
                var i;
                var x = document.getElementsByClassName("properties");
                for (i = 0; i < x.length; i++) {
                    x[i].style.display = "none"; 
                }
                document.getElementById(propertiesName).style.display = "block";
                openPropertiesAppCallback(propertiesName);
            }
            function setAddOpeningPropertiesVisible(visible) {
                var addOpeningProperties = document.getElementById("addOpeningProperties");
                addOpeningProperties.style.display = visible ? "block" : "none";
            }
            function initAvailableSheetingProfiles(profiles) {
                var i, j;
                var x = document.getElementsByClassName("sheetingProfiles");
                for (i = 0; i < x.length; ++i) {
                    var cboSheetingProfiles = x[i];
                    cboSheetingProfiles.innerHTML = "";
                    for (j = 0; j < profiles.length; ++j) {
                        var option = document.createElement("option");
                        option.setAttribute("value", profiles[j].value);
                        option.innerText = profiles[j].name;
                        cboSheetingProfiles.appendChild(option);
                    }
                }
            }
            function initAvailableColours(colours) {
                var i;
                var x = document.getElementsByClassName("colours");
                for (i = 0; i < x.length; ++i) {
                    (function() {
                        var j;
                        var cboColours = x[i];
                        cboColours.innerHTML = "";
                        for (j = 0; j < colours.length; ++j) {
                            var option = document.createElement("option");
                            option.setAttribute("value", colours[j].value);
                            option.style = "color:" + colours[j].textColour + ";background:" + colours[j].colour;
                            option.innerText = colours[j].name;
                            cboColours.appendChild(option);
                        }
                        cboColours.addEventListener("input", function() {
                            var j;
                            for (j = 0; j < colours.length; ++j) {
                                if (cboColours.value == colours[j].value) {
                                    cboColours.style = "color:" + colours[j].textColour + ";background:" + colours[j].colour;
                                }
                            }
                        });
                    })();
                }
            }
            function updateCboColour(cboColour) {
                var i;
                var child;
                for (i = 0; i < cboColour.children.length; ++i) {
                    child = cboColour.children[i];
                    if (child.value == cboColour.value) {
                        cboColour.style = "color:" + child.style.color + ";background:" + child.style.background;
                        break;
                    }
                }
            }
            function appLoaded() {
                var cboWallSheetingProfile = document.getElementById("cboWallSheetingProfile");
                var cboRoofSheetingProfile = document.getElementById("cboRoofSheetingProfile");
                var cboWallSheetingColour = document.getElementById("cboWallSheetingColour");
                var cboRoofSheetingColour = document.getElementById("cboRoofSheetingColour");
                var cboGutterColour = document.getElementById("cboGutterColour");
                var cboBargeColour = document.getElementById("cboBargeColour");
                var cboRidgeColour = document.getElementById("cboRidgeColour");
                cboWallSheetingProfile.addEventListener("input", function() {
                    app.setWallSheetingProfile(cboWallSheetingProfile.value);
                });
                cboRoofSheetingProfile.addEventListener("input", function() {
                    app.setRoofSheetingProfile(cboRoofSheetingProfile.value);
                });
                cboWallSheetingColour.addEventListener("input", function() {
                    app.setWallSheetingColour(cboWallSheetingColour.value);
                });
                cboRoofSheetingColour.addEventListener("input", function() {
                    app.setRoofSheetingColour(cboRoofSheetingColour.value);
                });
                cboGutterColour.addEventListener("input", function() {
                    app.setGutterColour(cboGutterColour.value);
                });
                cboBargeColour.addEventListener("input", function() {
                    app.setBargeColour(cboBargeColour.value);
                });
                cboRidgeColour.addEventListener("input", function() {
                    app.setRidgeColour(cboRidgeColour.value);
                });
                cboWallSheetingProfile.value = app.claddingData.wallSheetingProfile;
                cboRoofSheetingProfile.value = app.claddingData.roofSheetingProfile;
                cboWallSheetingColour.value = app.claddingData.wallSheetingColour;
                cboRoofSheetingColour.value = app.claddingData.roofSheetingColour;
                cboGutterColour.value = app.claddingData.gutterColour;
                cboBargeColour.value = app.claddingData.bargeColour;
                cboRidgeColour.value = app.claddingData.ridgeColour;
                updateCboColour(cboWallSheetingColour);
                updateCboColour(cboRoofSheetingColour);
                updateCboColour(cboGutterColour);
                updateCboColour(cboBargeColour);
                updateCboColour(cboRidgeColour);
            }
        </script>

        <div class="flex-container" style="width:100%;height:100%;">
            <div class="flex-container flex-vertical">
                <button class="w3-bar-item w3-button" onclick="openProperties('shedTypeProperties')">Shed Type</button>
                <button class="w3-bar-item w3-button" onclick="openProperties('addProperties')">Add</button>
                <!--
                <button class="w3-bar-item w3-button" onclick="openProperties('todoProperties')">Lean-Tos</button>
                <button class="w3-bar-item w3-button" onclick="openProperties('todoProperties')">Walls</button>
                <button class="w3-bar-item w3-button" onclick="openProperties('windowsDoorsSkylightsProperties')">Windows, Doors & Skylights</button>
                -->
                <button class="w3-bar-item w3-button" onclick="openProperties('coloursProperties')">Colours & Claddings</button>
                <button class="w3-bar-item w3-button" onclick="openProperties('todoProperties')">Options</button>
                <button class="w3-bar-item w3-button" onclick="openProperties('todoProperties')">Quote</button>
                <button class="w3-bar-item w3-button" onclick="openProperties('todoProperties')">Save & Share</button>
            </div>
            <div>
                <div id="shedTypeProperties" class="properties">
                    Building Type:
                        <select id="cboBuildingType">
                            <option value="gableRoofGarage">Gable Roof Garage</option>
                            <option value="skillionRoofGarage">Skillion Roof Garage</option>
                            <option value="flatRoofCarport">Flat Roof Carport</option>
                            <option value="gableRoofCarport">Gable Roof Carport</option>
                            <option value="americanBarn">American Barn</option>
                            <option value="australianBarn">Australian Barn</option>
                            <option value="skillionBarn">Skillion Barn</option>
                            <option value="quakerBarn">Quaker Barn</option>
                        </select><br/>
                    Span: <input id="txtSpan" type="text" value="6000"/><br/>
                    Length: <input id="txtLength" type="text" value="12000"/><br/>
                    Height: <input id="txtHeight" type="text" value="2400"/><br/>
                    Pitch: <input id="txtPitch" type="text" value="15"/><br/>
                </div>
                <div id="addProperties" class="properties" style="display:none">
                    <div class="flex-container flex-vertical">
                        <button id="btnAddPADoor" onclick="addOpeningButtonClickCallback('paDoor')">PA Door</button>
                        <button id="btnAddWindow" onclick="addOpeningButtonClickCallback('window')">Window</button>
                        <button id="btnAddRollerDoor" onclick="addOpeningButtonClickCallback('rollerDoor')">Roller Door</button>
                        <button id="btnToggleBays" onclick="toggleBaysButtonClickCallback()">Toggle Bays</button>
                        <button id="btnToggleWalls" onclick="toggleWallsButtonClickCallback('toggleWalls')">Toggle Walls</button>
                        <button id="btnAddSkylight">Skylight</button>
                    </div>
                    <div id="addOpeningProperties" style="display:none">
                        Opening Height: <input id="txtOpeningHeight"><br/>
                        Opening Width: <input id="txtOpeningWidth"><br/>
                    </div>
                </div>
                <div id="windowsDoorsSkylightsProperties" class="properties" style="display:none">
                    Tab a wall or a roof segment to zoom in and configure doors, windows, skylights.
                </div>
                <div id="coloursProperties" class="properties" style="display:none">
                    Wall Sheeting Type: <select id="cboWallSheetingProfile" class="sheetingProfiles"></select><br/>
                    Roof Sheeting Type: <select id="cboRoofSheetingProfile" class="sheetingProfiles"></select><br/>
                    Wall Sheeting Colour: <select id="cboWallSheetingColour" class="colours"></select><br/>
                    Roof Sheeting Colour: <select id="cboRoofSheetingColour" class="colours"></select><br/>
                    Gutter Colour: <select id="cboGutterColour" class="colours"></select><br/>
                    Barge Colour: <select id="cboBargeColour" class="colours"></select><br/>
                    Ridge Colour: <select id="cboRidgeColour" class="colours"></select><br/>
                </div>
                <div id="todoProperties" class="properties" style="display:none">
                    TODO
                </div>
            </div>
            <div style="width:100%">
                <canvas id="canvas" width="800" height="600"></canvas>
            </div>
        </div>
    </body>
</html>
