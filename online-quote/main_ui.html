<div class="flex-container" style="width:100%;height:100%;overflow-x:hidden;overflow-y:hidden">
    <div class="flex-container flex-vertical">
        <button class="w3-bar-item w3-button" onclick="openProperties('shedTypeProperties')">Size</button>
        <button class="w3-bar-item w3-button" onclick="openProperties('addProperties')">Add</button>
        <button class="w3-bar-item w3-button" onclick="openProperties('coloursProperties')">Colours</button>
        <button class="w3-bar-item w3-button" onclick="openProperties('optionsProperties')" style="display:none">Options</button>
        <button class="w3-bar-item w3-button" onclick="openProperties('todoProperties')">Quote</button>
        <button class="w3-bar-item w3-button" onclick="openProperties('saveAndShareProperties'); updateShareLink();" style="display:none">Save & Share</button>
    </div>
    <div style="flex-shrink:0; overflow-x:hidden; overflow-y:scroll;">
        <div id="shedTypeProperties" class="properties" w3-include-html="building_properties.html">
        </div>
        <div id="addProperties" class="properties" style="display:none">
            <div class="flex-container flex-vertical">
                <button id="btnAddPADoor" onclick="addOpeningButtonClickCallback('paDoor')">PA Door</button>
                <button id="btnAddWindow" onclick="addOpeningButtonClickCallback('window')">Window</button>
                <button id="btnAddRollerDoor" onclick="addOpeningButtonClickCallback('rollerDoor')">Roller Door</button>
                <button id="btnToggleBays" onclick="toggleBaysButtonClickCallback()">Open Bays</button>
                <button id="btnToggleWalls" onclick="toggleWallsButtonClickCallback('toggleWalls')">Internal Walls</button>
                <button id="btnSheetingStyle">Partial Cladding</button>
                <button id="btnAddSkylight">Skylight</button>
                <button id="btnAddWhirlybird">Whirlybird</button>
                <button id="btnToggleLeanTo">Toggle Lean-To</button>
                <button id="btnInsertMezzanine">Mezz</button>
                <button id="btnInsertBuilding">Building</button>

                <input id="chkFloorSystemEnabled" type="checkbox"><label for="chkFloorSystemEnabled">Floor System Enabled</label><br/>
                <div id="divFloorSystemProperties" style="display:none">
                    Floor System Height: <div id="floorSystemHeightSlider"></div> <input id="txtFloorSystemHeight" type="text"/><br/>
                </div>
            </div>
            <div id="toggleLeanToProperties" style="display:block">
                Lean-To Properties: <br/>
                Span: <input id="txtLeanToSpan" type="text"><br/>
                Height: <input id="txtLeanToHeight" type="text"><br/>
                Pitch: <input id="txtLeanToPitch" type="text"><br/>
            </div>
        </div>
        <div id="windowsDoorsSkylightsProperties" class="properties" style="display:none">
            Tab a wall or a roof segment to zoom in and configure doors, windows, skylights.
        </div>
        <div id="coloursProperties" class="properties" style="display:none" w3-include-html="colour_properties.html">
        </div>
        <div id="optionsProperties" class="properties" style="display:none">
            <input id="chkAnimate" type="checkbox"> Animate<br/>
        </div>
        <div id="saveAndShareProperties" class="properties" style="display:none">
            <a id="shareLink" href="">link</a>
            <button id="btnDownload" type="button" onclick="download()">Download</button>
        </div>
        <div id="todoProperties" class="properties" style="display:none">
            TODO
        </div>
        <div>
            <hr>
            <div id="addOpeningProperties" style="display:none" w3-include-html="opening_properties.html">
            </div>
            <div id="mezzanineProperties" style="display:none" w3-include-html="mezzanine_properties.html">
            </div>
            <div id="bayEditProperties" style="display:none" w3-include-html="bay_edit_properties.html">
            </div>
            <div id="wallSheetingStyleProperties" style="display:none" w3-include-html="wall_sheeting_style_properties.html">
            </div>
            <div id="divInsertBuilding" style="display:none" w3-include-html="insert_building.html">
            </div>
        </div>
    </div>
    <div style="flex-shrink:1; flex-grow:1; position:relative">
        <canvas id="canvas"></canvas>
    </div>
</div>
