Roof Type:
<select id="cboBuildingType">
    <option value="gableRoofGarage">Gable Roof Garage</option>
    <option value="skillionRoofGarage">Skillion Roof Garage</option>
    <option value="flatRoofCarport">Flat Roof Carport</option>
    <option value="gableRoofCarport">Gable Roof Carport</option>
    <option value="barn">Barn</option>
    <option value="skillionBarn">Skillion Barn</option>
    <option value="quakerBarn">Quaker Barn</option>
</select><br/>
Width: <div id="spanSlider"></div> <input id="txtSpan" type="text" value="6000"/><br/>
Length: <div id="lengthSlider"></div> <input id="txtLength" type="text" value="12000"/><br/>
Height: <div id="heightSlider"></div> <input id="txtHeight" type="text" value="2400"/><br/>
Roof Pitch: <div id="pitchSlider"></div> <input id="txtPitch" type="text" value="15"/><br/>
<div id="barnProperties" style="display:none" w3-include-html="barn_properties.html">
</div>
<label for="chkShowSideBaySizes">Custom Bay Sizes: </label><input id="chkShowSideBaySizes" type="checkbox"><br/>
<div id="sideBaySizes" style="display:none">
    Num Bays: <input id="txtNumSideBays" type="text"><button id="btnNumSideBaysReset" style="display:none">Reset</button><br/>
    <table id="tblSideBaySizes">
        <tr>
            <td>Bay Size</td><td></td>
        </tr>
    </table>
</div>
<div id="divBuildingPropertiesAdvanceOptions">
    <h3>Advance Options</h3>
    <div>
        <input id="chkDifferentOverhangs" type="checkbox"/><label for="chkDifferentOverhangs">Different Overhangs for each side</label><br/>
        <div id="divCommonOverhang" style="display:block">
            Overhang: <div id="overhangSlider"></div> <input id="txtOverhang" type="text" value="0"/><br/>
        </div>
        <div id="divDifferentOverhangs" style="display:none">
            Side 1 Overhang: <div id="side1OverhangSlider"></div> <input id="txtSide1Overhang" type="text" value="0"/><br/>
            Side 2 Overhang: <div id="side2OverhangSlider"></div> <input id="txtSide2Overhang" type="text" value="0"/><br/>
            End 1 Overhang: <div id="end1OverhangSlider"></div> <input id="txtEnd1Overhang" type="text" value="0"/><br/>
            End 2 Overhang: <div id="end2OverhangSlider"></div> <input id="txtEnd2Overhang" type="text" value="0"/><br/>
        </div>
        End 1 Roof Type:
        <div id="divEnd1RoofEndProperties" w3-include-html="roof_end_properties.html"></div>
        End 2 Roof Type:
        <div id="divEnd2RoofEndProperties" w3-include-html="roof_end_properties.html"></div>
    </div>
</div>
